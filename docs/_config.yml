title: Learn Promptfoo
description: Training guide for non-technical users to master promptfoo evaluations
theme: just-the-docs

# Plugins
plugins:
  - jekyll-default-layout
  - jekyll-feed
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-titles-from-headings
  - jekyll-relative-links

# Navigation settings
nav_sort: case_sensitive

# Just the Docs configuration
color_scheme: light
search_enabled: true
heading_anchors: true
aux_links:
  "Promptfoo Docs":
    - "https://www.promptfoo.dev/docs/"
  "Config Repository":
    - "https://github.com/itk-dev/prompfoo-docker/"

# Footer content
footer_content: "Training materials for Aarhus Kommune AI team"

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Document collections for organized navigation
collections:
  setup:
    output: true
    sort_by: nav_order
  evaluations:
    output: true
    sort_by: nav_order
  git:
    output: true
    sort_by: nav_order
  cheat-sheets:
    output: true
    sort_by: nav_order

# External navigation links
nav_external_links:
  - title: This Learn Promptfoo on GitHub
    url: https://github.com/itk-ai/learn-to-prompt-foo
    hide_icon: false # set to true to hide the external link icon - defaults to false
    opens_in_new_tab: false # set to true to open this link in a new tab - defaults to false